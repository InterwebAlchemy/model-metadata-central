model_id: mistral-small-latest
model_name: Mistral Small (latest)
model_provider: mistralai
model_description: Mistral's efficient small model alias for low-cost general-purpose and agentic workloads.
model_info: https://docs.mistral.ai/getting-started/models/models_overview/
model_type: chat
context_window: 256000
max_tokens: 256000
cost_per_token:
  input: 1.5e-7
  output: 6e-7
knowledge_cutoff: "2025-06-01"
tokenizer:
  family: tekken
tuning: [multimodal, function, instruction]
providers:
  - provider_id: mistralai
    model_id_on_provider: mistral-small-latest
  - provider_id: openrouter
    model_id_on_provider: mistralai/mistral-small-latest
