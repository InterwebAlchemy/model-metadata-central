model_id: mistral-nemo
model_name: Mistral Nemo
model_provider: mistralai
model_description: Open-weight Mistral Nemo model, useful for local or low-cost multilingual deployments.
model_info: https://docs.mistral.ai/getting-started/models/models_overview/
model_type: chat
context_window: 128000
max_tokens: 128000
cost_per_token:
  input: 1.5e-7
  output: 1.5e-7
knowledge_cutoff: "2024-07-01"
tokenizer:
  family: tekken
tuning: [function, instruction]
providers:
  - provider_id: mistralai
    model_id_on_provider: mistral-nemo
  - provider_id: openrouter
    model_id_on_provider: mistralai/mistral-nemo
