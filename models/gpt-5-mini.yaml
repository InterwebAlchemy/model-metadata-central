model_id: gpt-5-mini
model_name: GPT-5 Mini
model_provider: openai
model_description: Lower-cost GPT-5 variant for high-volume tasks that still benefit from reasoning support.
model_info: https://platform.openai.com/docs/models/gpt-5-mini
model_type: chat
context_window: 400000
max_tokens: 128000
cost_per_token:
  input: 2.5e-7
  output: 0.000002
knowledge_cutoff: "2024-05-30"
tokenizer:
  family: tiktoken
  name: o200k_base
tuning: [multimodal, function]
providers:
  - provider_id: openai
    model_id_on_provider: gpt-5-mini
  - provider_id: openrouter
    model_id_on_provider: openai/gpt-5-mini
