  output: 0.0000045
knowledge_cutoff: "2025-08-31"
tokenizer:
  family: tiktoken
  name: o200k_base
tuning: [multimodal, function]
providers:
  - provider_id: openai
    model_id_on_provider: gpt-5.4-mini
  - provider_id: openrouter
    model_id_on_provider: openai/gpt-5.4-mini
