model_id: gpt-5.4-mini
model_name: GPT-5.4 mini
model_provider: openai
model_description: Fast, cost-efficient GPT-5.4 variant for coding, computer use, and subagent workloads.
model_info: https://platform.openai.com/docs/models/gpt-5.4-mini
model_type: chat
context_window: 400000
