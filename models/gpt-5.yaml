model_id: gpt-5
model_name: GPT-5
model_provider: openai
model_description: General GPT-5 model for reasoning, coding, and multimodal text/image workflows.
model_info: https://platform.openai.com/docs/models/gpt-5
model_type: chat
context_window: 400000
max_tokens: 128000
cost_per_token:
  input: 0.00000125
  output: 0.00001
knowledge_cutoff: "2024-09-30"
tokenizer:
  family: tiktoken
  name: o200k_base
tuning: [multimodal, function]
providers:
  - provider_id: openai
    model_id_on_provider: gpt-5
  - provider_id: openrouter
    model_id_on_provider: openai/gpt-5
