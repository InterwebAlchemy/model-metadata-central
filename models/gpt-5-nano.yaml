model_id: gpt-5-nano
model_name: GPT-5 Nano
model_provider: openai
model_description: Smallest GPT-5 variant for inexpensive, latency-sensitive automation.
model_info: https://platform.openai.com/docs/models/gpt-5-nano
model_type: chat
context_window: 400000
max_tokens: 128000
cost_per_token:
  input: 5e-8
  output: 4e-7
knowledge_cutoff: "2024-05-30"
tokenizer:
  family: tiktoken
  name: o200k_base
tuning: [multimodal, function]
providers:
  - provider_id: openai
    model_id_on_provider: gpt-5-nano
  - provider_id: openrouter
    model_id_on_provider: openai/gpt-5-nano
