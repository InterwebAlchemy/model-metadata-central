model_id: mistral-medium-latest
model_name: Mistral Medium (latest)
model_provider: mistralai
model_description: Mistral's balanced mid-tier model for reasoning, coding, and multimodal workflows.
model_info: https://docs.mistral.ai/getting-started/models/models_overview/
model_type: chat
context_window: 128000
max_tokens: 16384
cost_per_token:
  input: 4e-7
  output: 0.000002
knowledge_cutoff: "2025-05-01"
tokenizer:
  family: tekken
tuning: [multimodal, function, instruction]
providers:
  - provider_id: mistralai
    model_id_on_provider: mistral-medium-latest
  - provider_id: openrouter
    model_id_on_provider: mistralai/mistral-medium-latest
